name: Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string
        default: ""
      backport_target_branch:
        required: false
        type: string
        default: ""
      backport_commit_range:
        required: false
        type: string
        default: ""
      job_name_suffix:
        required: false
        type: string
        default: ""
      run_frontend:
        required: false
        type: boolean
        default: true
      run_scala:
        required: false
        type: boolean
        default: true
      run_python:
        required: false
        type: boolean
        default: true
      run_agent_service:
        required: false
        type: boolean
        default: true

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  frontend:
    if: ${{ inputs.run_frontend }}
    name: ${{ format('frontend{0} ({1}, 18)', inputs.job_name_suffix, matrix.os) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: macos-latest
            arch: arm64
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
        node-version:
          - 20.19.0
    steps:
      - name: Checkout Texera
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          fetch-depth: 0
      - name: Prepare backport workspace
        if: ${{ inputs.backport_target_branch != '' }}
        working-directory: ${{ github.workspace }}
        run: bash ./.github/scripts/prepare-backport-checkout.sh "${{ inputs.backport_target_branch }}" "${{ inputs.backport_commit_range }}"
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          architecture: ${{ matrix.arch }}
      - uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.node-version }}-yarn-cache-v4-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.node-version }}-yarn-cache-v4-
      - name: Prepare Yarn 4.14.1
        run: corepack enable && corepack prepare yarn@4.14.1 --activate
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependency
        timeout-minutes: 20
        run: yarn --cwd frontend install --immutable --inline-builds --network-timeout=100000
      - name: Lint with Prettier & ESLint
        run: yarn --cwd frontend format:ci
      - name: Prod build
        run: yarn --cwd frontend run build:ci
      - name: Check bundled npm packages against per-module LICENSE-binary files
        if: matrix.os == 'ubuntu-latest'
        run: ./bin/licensing/check_binary_deps.py npm frontend/dist/3rdpartylicenses.json
      - name: Run frontend unit tests
        run: yarn --cwd frontend run test:ci --code-coverage
      - name: Upload frontend coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/**/lcov.info
          flags: frontend
          fail_ci_if_error: false

  scala:
    if: ${{ inputs.run_scala }}
    name: ${{ format('scala{0} ({1}, 11)', inputs.job_name_suffix, matrix.os) }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        java-version: [11]
    runs-on: ${{ matrix.os }}
    env:
      JAVA_OPTS: -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
      JVM_OPTS: -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          fetch-depth: 0
      - name: Prepare backport workspace
        if: ${{ inputs.backport_target_branch != '' }}
        working-directory: ${{ github.workspace }}
        run: bash ./.github/scripts/prepare-backport-checkout.sh "${{ inputs.backport_target_branch }}" "${{ inputs.backport_commit_range }}"
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 11
      - name: Setup Python for Scala tests
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Show Python
        run: python --version || python3 --version
      - name: Create Databases
        # Must run before any sbt compile step: the build's JOOQ source
        # generators connect to texera_db while compiling.
        run: |
          psql -h localhost -U postgres -f sql/texera_ddl.sql
          psql -h localhost -U postgres -f sql/iceberg_postgres_catalog.sql
          psql -h localhost -U postgres -f sql/texera_lakefs.sql
        env:
          PGPASSWORD: postgres
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0
        with:
          extraSbtFiles: '["*.sbt", "project/**.{scala,sbt}", "project/build.properties" ]'
      - name: Lint and build distributable bundles
        # Single sbt invocation runs scalafmt -> scalafix -> per-module dist
        # in order; sbt exits at the first failing command (fail-fast). Each
        # command is a separate sbt arg, not joined with ';', so a dist
        # failure aborts the rest. scalafix triggers compile (and JOOQ
        # codegen), which the dist commands then reuse incrementally.
        run: |
          sbt scalafmtCheckAll \
              "scalafixAll --check" \
              ConfigService/dist \
              AccessControlService/dist \
              FileService/dist \
              ComputingUnitManagingService/dist \
              WorkflowCompilingService/dist \
              WorkflowExecutionService/dist
      - name: Unzip dists and check binary licenses
        # Unzips every service's dist bundle, runs the binding LICENSE-binary
        # check, then runs the advisory per-dep audit. The audit always runs
        # (mirroring the previous 'if: always()' on its own step) and never
        # fails the step; the binding check's exit code drives the result.
        run: |
          set -euo pipefail
          mkdir -p /tmp/dists
          for zip in \
            config-service/target/universal/config-service-*.zip \
            access-control-service/target/universal/access-control-service-*.zip \
            file-service/target/universal/file-service-*.zip \
            computing-unit-managing-service/target/universal/computing-unit-managing-service-*.zip \
            workflow-compiling-service/target/universal/workflow-compiling-service-*.zip \
            amber/target/universal/amber-*.zip; do
              unzip -q "$zip" -d /tmp/dists/
          done

          lib_paths=(
            /tmp/dists/config-service-*/lib
            /tmp/dists/access-control-service-*/lib
            /tmp/dists/file-service-*/lib
            /tmp/dists/computing-unit-managing-service-*/lib
            /tmp/dists/workflow-compiling-service-*/lib
            /tmp/dists/amber-*/lib
          )

          check_exit=0
          ./bin/licensing/check_binary_deps.py jar "${lib_paths[@]}" || check_exit=$?
          ./bin/licensing/audit_jar_licenses.py "${lib_paths[@]}" || true
          exit "$check_exit"
      - name: Install dependencies
        # Only the backend test step needs the python deps; install just
        # before tests so a lint or dist failure does not pay for them.
        run: |
          python -m pip install --upgrade pip
          if [ -f amber/requirements.txt ]; then pip install -r amber/requirements.txt; fi
          if [ -f amber/operator-requirements.txt ]; then pip install -r amber/operator-requirements.txt; fi
      - name: Create texera_db_for_test_cases
        run: psql -h localhost -U postgres -v DB_NAME=texera_db_for_test_cases -f sql/texera_ddl.sql
        env:
          PGPASSWORD: postgres
      - name: Set docker-java API version
        run: |
          echo "api.version=1.52" >> ~/.docker-java.properties
          cat ~/.docker-java.properties
      - name: Run backend tests
        # 'jacoco' runs tests under sbt-jacoco's JVM agent and emits per-
        # module jacoco.xml that the codecov upload step picks up.
        run: sbt jacoco
      - name: Upload scala coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./**/target/scala-2.13/jacoco/report/jacoco.xml
          flags: scala
          fail_ci_if_error: false

  python:
    if: ${{ inputs.run_python }}
    name: ${{ format('python{0} ({1}, {2})', inputs.job_name_suffix, matrix.os, matrix.python-version) }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout Texera
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          fetch-depth: 0
      - name: Prepare backport workspace
        if: ${{ inputs.backport_target_branch != '' }}
        run: bash ./.github/scripts/prepare-backport-checkout.sh "${{ inputs.backport_target_branch }}" "${{ inputs.backport_commit_range }}"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f amber/requirements.txt ]; then pip install -r amber/requirements.txt; fi
          if [ -f amber/operator-requirements.txt ]; then pip install -r amber/operator-requirements.txt; fi
          if [ "${{ matrix.python-version }}" = "3.12" ]; then pip install pip-licenses; fi
      - name: Generate pip-licenses manifest
        if: matrix.python-version == '3.12'
        run: pip-licenses --format=csv --ignore-packages pip-licenses prettytable wcwidth > /tmp/pip-licenses.csv
      - name: Check installed Python packages against per-module LICENSE-binary files
        if: matrix.python-version == '3.12'
        run: ./bin/licensing/check_binary_deps.py python /tmp/pip-licenses.csv
      - name: Create iceberg catalog database
        run: psql -h localhost -U postgres -f sql/iceberg_postgres_catalog.sql
        env:
          PGPASSWORD: postgres
      - name: Lint with Ruff
        run: |
          cd amber/src/main/python && ruff check . && ruff format --check .
      - name: Install dev dependencies
        # Test-only deps live in amber/dev-requirements.txt and are
        # installed after the LICENSE-binary snapshot above so they never
        # appear in pip-licenses output. Packaging skips this file.
        run: |
          if [ -f amber/dev-requirements.txt ]; then pip install -r amber/dev-requirements.txt; fi
      - name: Test with pytest
        run: |
          cd amber/src/main/python && pytest --cov=. --cov-report=xml -sv
      - name: Upload python coverage to Codecov
        if: matrix.python-version == '3.12' && always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./amber/src/main/python/coverage.xml
          flags: python
          fail_ci_if_error: false

  agent-service:
    if: ${{ inputs.run_agent_service }}
    name: ${{ format('agent-service{0} ({1})', inputs.job_name_suffix, matrix.os) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: ["1.3.3"]
    defaults:
      run:
        working-directory: agent-service
    steps:
      - name: Checkout Texera
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          fetch-depth: 0
      - name: Prepare backport workspace
        if: ${{ inputs.backport_target_branch != '' }}
        working-directory: ${{ github.workspace }}
        run: bash ./.github/scripts/prepare-backport-checkout.sh "${{ inputs.backport_target_branch }}" "${{ inputs.backport_commit_range }}"
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s -- bun-v${{ matrix.bun-version }}
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: Install production dependencies
        run: bun install --production --frozen-lockfile
      - name: Generate agent-service license manifest
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          bun run bin/collect-licenses.ts > dist/3rdpartylicenses.json
      - name: Check bundled agent-service packages against per-module LICENSE-binary files
        if: matrix.os == 'ubuntu-latest'
        run: ../bin/licensing/check_binary_deps.py agent-npm dist/3rdpartylicenses.json
      - name: Install development dependencies
        run: bun install --frozen-lockfile
      - name: Lint with Prettier
        run: bun run format:check
      - name: Typecheck
        run: bun run typecheck
      - name: Run unit tests
        run: bun test --coverage --coverage-reporter=lcov
      - name: Upload agent-service coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./agent-service/coverage/lcov.info
          flags: agent-service
          fail_ci_if_error: false
