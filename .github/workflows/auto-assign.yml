name: Auto-assign author
on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  # --------------------------------------------------------
  # Assign the issue author as the assignee on new/reopened issues
  # (skips if the issue already has assignees)
  # --------------------------------------------------------
  assign-issue-author:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const issue_number = issue.number;
            const author = issue.user && issue.user.login;

            if (!author) {
              core.info(`Issue #${issue_number} has no author login, skipping.`);
              return;
            }

            const existing = issue.assignees || [];
            if (existing.length > 0) {
              core.info(
                `Issue #${issue_number} already has ${existing.length} assignee(s), skipping.`
              );
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author],
              });
              core.info(`Assigned @${author} to issue #${issue_number}.`);
            } catch (e) {
              core.warning(
                `Failed to assign @${author} to issue #${issue_number}: ${e.message}`
              );
              throw e;
            }

  # --------------------------------------------------------
  # Assign the PR author as the assignee on new/reopened PRs
  # (skips if the PR already has assignees)
  # --------------------------------------------------------
  assign-pr-author:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const issue_number = pr.number;
            const author = pr.user && pr.user.login;

            if (!author) {
              core.info(`PR #${issue_number} has no author login, skipping.`);
              return;
            }

            // PR authors that are bots (e.g. dependabot[bot]) cannot be assigned.
            if (pr.user.type === 'Bot' || author.endsWith('[bot]')) {
              core.info(`PR #${issue_number} authored by bot @${author}, skipping.`);
              return;
            }

            const existing = pr.assignees || [];
            if (existing.length > 0) {
              core.info(
                `PR #${issue_number} already has ${existing.length} assignee(s), skipping.`
              );
              return;
            }

            try {
              // Note: PR assignees use the issues API (PRs are issues under the hood).
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author],
              });
              core.info(`Assigned @${author} to PR #${issue_number}.`);
            } catch (e) {
              core.warning(
                `Failed to assign @${author} to PR #${issue_number}: ${e.message}`
              );
              throw e;
            }
