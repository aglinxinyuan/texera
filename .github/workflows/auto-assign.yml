name: Auto-assign
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  # --------------------------------------------------------
  # Assign the PR author as the assignee on new/reopened PRs.
  # New issues are intentionally left unassigned so they go
  # through triage (see issue-triage.yml).
  # --------------------------------------------------------
  assign-pr-author:
    if: >-
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const issue_number = pr.number;
            const author = pr.user && pr.user.login;

            if (!author) {
              core.info(`PR #${issue_number} has no author login, skipping.`);
              return;
            }

            // PR authors that are bots (e.g. dependabot[bot]) cannot be assigned.
            if (pr.user.type === 'Bot' || author.endsWith('[bot]')) {
              core.info(`PR #${issue_number} authored by bot @${author}, skipping.`);
              return;
            }

            const existing = pr.assignees || [];
            if (existing.length > 0) {
              core.info(
                `PR #${issue_number} already has ${existing.length} assignee(s), skipping.`
              );
              return;
            }

            try {
              // PR assignees use the issues API (PRs are issues under the hood).
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author],
              });
              core.info(`Assigned @${author} to PR #${issue_number}.`);
            } catch (e) {
              core.warning(
                `Failed to assign @${author} to PR #${issue_number}: ${e.message}`
              );
              throw e;
            }

  # --------------------------------------------------------
  # When a PR is merged, find the issues it closes (via the
  # "Linked issues" relationship — closingIssuesReferences)
  # and replace their assignees with the PR author so credit
  # goes to whoever actually shipped the fix.
  # --------------------------------------------------------
  credit-issue-on-pr-merge:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Credit PR author on linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const author = pr.user && pr.user.login;

            if (!author) {
              core.info(`PR #${pr.number} has no author login, skipping.`);
              return;
            }
            if (pr.user.type === 'Bot' || author.endsWith('[bot]')) {
              core.info(`PR #${pr.number} authored by bot @${author}, skipping.`);
              return;
            }

            // Pull all issues this PR closes (handles "Closes #N",
            // "Fixes #N", manual linking via the sidebar, etc.).
            const linked = await github.graphql(
              `query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        repository { nameWithOwner }
                        assignees(first: 20) { nodes { login } }
                      }
                    }
                  }
                }
              }`,
              { owner, repo, pr: pr.number }
            );

            const nodes =
              (linked.repository &&
                linked.repository.pullRequest &&
                linked.repository.pullRequest.closingIssuesReferences &&
                linked.repository.pullRequest.closingIssuesReferences.nodes) || [];

            if (nodes.length === 0) {
              core.info(`PR #${pr.number} closes no linked issues, nothing to credit.`);
              return;
            }

            for (const issue of nodes) {
              // Only touch issues in this repository.
              if (issue.repository.nameWithOwner !== `${owner}/${repo}`) {
                core.info(
                  `Skipping cross-repo linked issue ${issue.repository.nameWithOwner}#${issue.number}.`
                );
                continue;
              }

              const issue_number = issue.number;
              const current = (issue.assignees.nodes || []).map(n => n.login);
              const toRemove = current.filter(login => login !== author);

              // Remove existing assignees that aren't the PR author so the
              // final assignee list is just [author] — gives sole credit
              // to whoever actually shipped the fix.
              if (toRemove.length > 0) {
                try {
                  await github.rest.issues.removeAssignees({
                    owner,
                    repo,
                    issue_number,
                    assignees: toRemove,
                  });
                  core.info(
                    `Removed ${toRemove.map(l => '@' + l).join(', ')} from issue #${issue_number}.`
                  );
                } catch (e) {
                  core.warning(
                    `Failed to remove assignees from issue #${issue_number}: ${e.message}`
                  );
                }
              }

              if (current.includes(author)) {
                core.info(`Issue #${issue_number} already has @${author} as assignee.`);
                continue;
              }

              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: [author],
                });
                core.info(`Assigned @${author} to issue #${issue_number} (credit on merge).`);
              } catch (e) {
                core.warning(
                  `Failed to assign @${author} to issue #${issue_number}: ${e.message}`
                );
              }
            }
